<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Writedit</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

  <aside id="sidebar" class="hidden">
    <button onclick="goHome()">🏠 Livres</button>
    <button onclick="loadTextEditor()">✍️ Texte</button>
    <button onclick="loadCharacters()">👤 Personnages</button>
    <button onclick="loadWiki()">📚 Wiki</button>
    <button onclick="loadTranslator()">🌍 Traducteur</button>
    <button onclick="loadSynonyms()">💡 Synonymes</button>
    <button onclick="loadStats()">📊 Stats</button>
    <button onclick="exportAll()">📄 Export complet</button>
    <input id="searchInput" placeholder="Rechercher...">
    <button onclick="search()">🔎</button>

  </aside>

  <main id="main-content">
    
    <header>
      <h1>Writedit</h1>
    </header>

    <div id="content"></div>

  </main>

  <aside id="chaptersSidebar" class="hidden">

  <div class="editor-tools-sidebar">
    <button onclick="formatText('bold')">Gras</button>
    <button onclick="formatText('italic')">Italic</button>
    <button onclick="formatText('underline')">Souligné</button>
   </div>

   <div class="chapter-colors">
    <button onclick="setChapterColor('#f8b4c8', this)" style="background: #f8b4c8;"></button>
    <button onclick="setChapterColor('#a8d5ff', this)" style="background: #a8d5ff;"></button>
    <button onclick="setChapterColor('#b9f6ca', this)" style="background: #b9f6ca;"></button>
    <button onclick="setChapterColor('#ffffff', this)" style="background:#ffffff;"></button>
  </div>



  <div class="sidebar-section">
    <h3>📖 Chapitres</h3>
    <div id="chaptersList"></div>
    <button onclick="createChapter()">➕ Nouveau</button>
  </div>

  <div class="sidebar-section">
    <h3>👤 Personnages</h3>
    <div id="charactersList"></div>
    <div id="characterDetails"></div>
    <button onclick="createCharacter()">➕ Nouveau</button>
    <!--<button onclick="insertCharacter()">➕ Insert</button>-->
  </div>

  </aside>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>

</body>
