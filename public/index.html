<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Writedit</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

  <aside id="sidebar" class="hidden">
    <button id="toggleSidebar">☰</button>
    <button onclick="goHome()">
      <span class="icon">🏠</span>
      <span class="label">Livres</span>
    </button>
    <button onclick="loadTextEditor()">
      <span class="icon">✍️</span>
      <span class="label">Texte</span>
    </button>
    <button onclick="loadCharacters()">
      <span class="icon">👤</span> 
      <span class="label">Personnages</span>
    </button>
    <button onclick="loadWiki()">
      <span class="icon">📚</span> 
      <span class="label">Wiki</span>
    </button>
    <button onclick="loadTranslator()">
      <span class="icon">🌍</span> 
      <span class="label">Traducteur</span>
    </button>
    <button onclick="loadSynonyms()">
      <span class="icon">💡</span> 
      <span class="label">Synonymes</span>
    </button>
    <button onclick="loadStats()">
      <span class="icon">📊</span> 
      <span class="label">Stats</span>
    </button>
    <input id="searchInput" placeholder="Rechercher...">
    <button onclick="search()">
      <span class="icon">🔎</span>
    </button>
    <button onclick="exportAll()">
      <span class="icon">📄</span> 
      <span class="label">Export complet</span>
    </button>
    <button onclick="loadReleases()">
      📚 Sorties
    </button>

  </aside>

  <main id="main-content">
    
    <header>
      <h1>Writedit</h1>
    </header>

    <div id="content"></div>

  </main>


  <button id="toggleChapters">➡</button>
  <aside id="chaptersSidebar" class="hidden">

    <div class="editor-tools-sidebar">
      <button onclick="formatText('bold')">Gras</button>
      <button onclick="formatText('italic')">Italic</button>
      <button onclick="formatText('underline')">Souligné</button>
     </div>

     <div class="chapter-colors">
      <button onclick="setChapterColor('#f8b4c8', this)" style="background: #f8b4c8;"></button>
      <button onclick="setChapterColor('#a8d5ff', this)" style="background: #a8d5ff;"></button>
      <button onclick="setChapterColor('#feff82', this)" style="background: #feff82;"></button>
      <button onclick="setChapterColor('#ffffff', this)" style="background:#ffffff;"></button>
    </div>



    <div class="sidebar-section">
      <h3>📖 Chapitres</h3>
      <div id="chaptersList"></div>
      <button onclick="createChapter()">➕ Nouveau</button>
    </div>

    <div class="sidebar-section">
      <h3>👤 Personnages</h3>
      <div id="charactersList"></div>
      <div id="characterDetails"></div>
      <button onclick="createCharacter()">➕ Nouveau</button>
    </div>

  </aside>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>


</body>
